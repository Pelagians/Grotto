name: Build Grotto

on:
  schedule:
    # GitHub Actions cron is UTC.
    - cron: '17 11 * * *'

  push:
    branches:
      - main
    tags:
      - "v*"

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-grotto-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  image:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: grotto-openclaw
            kind: agent
            image: ghcr.io/pelagians/grotto-openclaw
            title: Grotto OpenClaw
            description: General OpenClaw gateway with curated baseline tools and persistent user-installed toolchains
            file: ./Containerfile
          - name: grotto-chatgpt-desktop
            kind: desktop
            image: ghcr.io/pelagians/grotto-chatgpt-desktop
            title: Grotto ChatGPT Desktop
            description: Selkies-streamed ChatGPT and Codex desktop workbench
            file: ./Containerfile.chatgpt-desktop
            wrapper_ref: 52e9701e3f1be291821cff904b6cd4bdce30998d
            codex_cli_version: 0.144.5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reclaim runner disk space
        if: matrix.kind == 'desktop'
        shell: bash
        run: |
          set -euxo pipefail
          df -h /
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          sudo docker system prune --all --force --volumes || true
          available_kib="$(df --output=avail -k / | tail -n 1)"
          minimum_kib="$((15 * 1024 * 1024))"
          if (( available_kib < minimum_kib )); then
            echo "At least 15 GiB of free runner storage is required." >&2
            df -h /
            exit 1
          fi
          df -h /

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/pelagians/grotto

      - name: Build and publish OpenClaw image
        if: matrix.kind == 'agent'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Build and publish desktop image
        if: matrix.kind == 'desktop'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CODEX_DESKTOP_LINUX_REF=${{ matrix.wrapper_ref }}
            CODEX_CLI_VERSION=${{ matrix.codex_cli_version }}
            GROTTO_BUILD_REVISION=${{ github.sha }}
            MAX_BUILD_THREADS=4
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=min,scope=${{ matrix.name }}
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      - name: Smoke test desktop runtime
        if: matrix.kind == 'desktop' && github.event_name == 'pull_request'
        shell: bash
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          image="$(head -n 1 <<< "$IMAGE_TAGS")"
          docker run --rm \
            --user abc \
            --shm-size=2g \
            --env HOME=/config \
            --env CODEX_HOME=/config/.codex \
            --env GROTTO_EXPECT_CODEX_SANDBOX=record \
            --entrypoint /usr/local/libexec/grotto-chatgpt-desktop-smoke \
            "$image"
