name: Build Grotto

on:
  schedule:
    # GitHub Actions cron is UTC.
    - cron: '17 11 * * *'

  push:
    branches:
      - main
    tags:
      - "v*"

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-grotto-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  image:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: grotto-comms
            image: ghcr.io/pelagians/grotto-comms
            title: Grotto Communications
            description: Focused OpenClaw communications/calendar agent for email, messaging, calendar, reminders, and contacts
            file: ./Containerfile
            template: communications-calendar
            verify_tools: himalaya gcalcli vdirsyncer khal khard jq
            link_formulae: ""
            npm_packages: ""
          - name: grotto-records
            image: ghcr.io/pelagians/grotto-records
            title: Grotto Records
            description: Focused OpenClaw records agent for VIC, Postgres, SQLite, JSON, CSV, and evidence-backed record writes
            file: ./Containerfile
            template: records
            verify_tools: sqlite3 duckdb jq yq psql
            link_formulae: sqlite libpq
            npm_packages: ""
          - name: grotto-documents
            image: ghcr.io/pelagians/grotto-documents
            title: Grotto Documents
            description: Focused OpenClaw documents agent for OCR, extraction, conversion, classification, and managed document organization
            file: ./Containerfile
            template: documents
            verify_tools: pandoc pdfinfo pdftotext qpdf tesseract ocrmypdf python3.13 jq
            link_formulae: ""
            npm_packages: ""
          - name: grotto-browser-agent
            image: ghcr.io/pelagians/grotto-browser-agent
            title: Grotto Browser Agent
            description: Focused OpenClaw browser workflow agent that controls separate internal browser runtime containers
            file: ./Containerfile
            template: browser-agent
            verify_tools: jq node npm playwright
            link_formulae: ""
            npm_packages: playwright@1.60.0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/pelagians/grotto

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENQUAD_TEMPLATE=${{ matrix.template }}
            OPENQUAD_IMAGE_NAME=${{ matrix.name }}
            OPENQUAD_LINK_FORMULAE=${{ matrix.link_formulae }}
            OPENQUAD_NPM_PACKAGES=${{ matrix.npm_packages }}
            OPENQUAD_VERIFY_TOOLS=${{ matrix.verify_tools }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
